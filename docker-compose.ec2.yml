# Gardenia EC2 stack — API + web against external RDS (no local Postgres).
# Deployed by Terraform user-data on the application host.

name: gardenia-ec2

services:
  api:
    image: ${API_IMAGE:-sisqueslabs/gardenia-api:alpha}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_DRIVER: postgres
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_DATABASE: ${DATABASE_DATABASE}
      DATABASE_SYNCHRONIZE: ${DATABASE_SYNCHRONIZE:-false}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-refresh_token}
      QR_BASE_URL: ${QR_BASE_URL}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO/dev/null http://localhost:3000/api/health 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    image: ${WEB_IMAGE:-sisqueslabs/gardenia-web:alpha}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:3000"
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL}
